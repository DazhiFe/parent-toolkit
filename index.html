    <script>
      // 主题判断前置，避免首屏 FOUC
      (function () {
        try {
          var t = localStorage.getItem('userTheme')
          var hour = new Date().getHours()
          var dark = t === 'dark' || (!t && (hour >= 18 || hour < 6))
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
    <style>
      /* 全局加载动画样式，需要内联以保证立即显示 */
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 222, 173, 0.5) 0%, transparent 40%),
          radial-gradient(circle at 80% 30%, rgba(173, 216, 230, 0.6) 0%, transparent 40%),
          radial-gradient(circle at 50% 80%, rgba(221, 214, 254, 0.5) 0%, transparent 40%),
          linear-gradient(135deg, #fef9f3 0%, #f0f9ff 50%, #faf5ff 100%);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        transition: opacity 0.6s ease, visibility 0.6s ease;
        overflow: hidden;
      }
      #app-loader.loader-hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* 漂浮的小气泡 */
      .loader-bubble {
        position: absolute;
        border-radius: 50%;
        opacity: 0.6;
        animation: float-up linear infinite;
      }
      .loader-bubble:nth-child(1) { left: 10%; bottom: -50px; width: 40px; height: 40px; background: #fde68a; animation-duration: 8s; animation-delay: 0s; }
      .loader-bubble:nth-child(2) { left: 25%; bottom: -50px; width: 24px; height: 24px; background: #bae6fd; animation-duration: 6s; animation-delay: 1s; }
      .loader-bubble:nth-child(3) { left: 70%; bottom: -50px; width: 50px; height: 50px; background: #fbcfe8; animation-duration: 10s; animation-delay: 2s; }
      .loader-bubble:nth-child(4) { left: 85%; bottom: -50px; width: 30px; height: 30px; background: #c7d2fe; animation-duration: 7s; animation-delay: 0.5s; }
      .loader-bubble:nth-child(5) { left: 50%; bottom: -50px; width: 36px; height: 36px; background: #bbf7d0; animation-duration: 9s; animation-delay: 3s; }

      @keyframes float-up {
        0% { transform: translateY(0) translateX(0); opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { transform: translateY(-110vh) translateX(30px); opacity: 0; }
      }

      /* 中心容器 */
      .loader-stage {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* 萌系吉祥物 */
      .loader-mascot {
        position: relative;
        width: 110px;
        height: 110px;
        animation: mascot-bounce 1.6s ease-in-out infinite;
      }
      .mascot-body {
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #fcd34d, #f59e0b);
        border-radius: 50% 50% 45% 45%;
        position: relative;
        box-shadow: 0 12px 30px rgba(245, 158, 11, 0.3), inset -6px -6px 0 rgba(0,0,0,0.05);
      }
      /* 眼睛 */
      .mascot-eye {
        position: absolute;
        width: 14px;
        height: 14px;
        background: #1f2937;
        border-radius: 50%;
        top: 38%;
        animation: blink 3s ease-in-out infinite;
      }
      .mascot-eye::after {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 5px;
        height: 5px;
        background: #fff;
        border-radius: 50%;
      }
      .mascot-eye.left { left: 28%; }
      .mascot-eye.right { right: 28%; }
      /* 腮红 */
      .mascot-cheek {
        position: absolute;
        width: 14px;
        height: 8px;
        background: #fb7185;
        border-radius: 50%;
        top: 56%;
        opacity: 0.7;
      }
      .mascot-cheek.left { left: 18%; }
      .mascot-cheek.right { right: 18%; }
      /* 嘴巴 */
      .mascot-mouth {
        position: absolute;
        width: 18px;
        height: 10px;
        border: 2.5px solid #1f2937;
        border-top: none;
        border-radius: 0 0 18px 18px;
        top: 60%;
        left: 50%;
        transform: translateX(-50%);
      }
      /* 头顶光环（书本造型） */
      .mascot-hat {
        position: absolute;
        top: -18px;
        left: 50%;
        transform: translateX(-50%) rotate(-8deg);
        width: 50px;
        height: 14px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 3px;
        box-shadow: 0 3px 8px rgba(99, 102, 241, 0.4);
        animation: hat-wiggle 1.6s ease-in-out infinite;
      }
      .mascot-hat::before {
        content: '';
        position: absolute;
        left: 50%;
        top: 0;
        transform: translateX(-50%);
        width: 2px;
        height: 100%;
        background: rgba(255,255,255,0.5);
      }

      @keyframes mascot-bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
      }
      @keyframes hat-wiggle {
        0%, 100% { transform: translateX(-50%) rotate(-8deg); }
        50% { transform: translateX(-50%) rotate(8deg); }
      }
      @keyframes blink {
        0%, 92%, 100% { transform: scaleY(1); }
        95% { transform: scaleY(0.1); }
      }

      /* 影子 */
      .mascot-shadow {
        width: 80px;
        height: 10px;
        background: rgba(0,0,0,0.12);
        border-radius: 50%;
        margin-top: 8px;
        animation: shadow-pulse 1.6s ease-in-out infinite;
        filter: blur(2px);
      }
      @keyframes shadow-pulse {
        0%, 100% { transform: scale(1); opacity: 0.4; }
        50% { transform: scale(0.7); opacity: 0.2; }
      }

      /* 标题 */
      .loader-title {
        margin-top: 28px;
        font-size: 22px;
        font-weight: 700;
        color: #1f2937;
        letter-spacing: 0.5px;
      }
      .loader-title span {
        display: inline-block;
        animation: letter-jump 1.4s ease-in-out infinite;
      }
      .loader-title span:nth-child(1) { animation-delay: 0s; color: #f59e0b; }
      .loader-title span:nth-child(2) { animation-delay: 0.1s; color: #ef4444; }
      .loader-title span:nth-child(3) { animation-delay: 0.2s; color: #6366f1; }
      .loader-title span:nth-child(4) { animation-delay: 0.3s; color: #10b981; }
      .loader-title span:nth-child(5) { animation-delay: 0.4s; color: #8b5cf6; }
      @keyframes letter-jump {
        0%, 60%, 100% { transform: translateY(0); }
        30% { transform: translateY(-8px); }
      }

      /* 趣味文案轮播 */
      .loader-tips {
        margin-top: 12px;
        height: 20px;
        font-size: 13px;
        color: #6b7280;
        position: relative;
        overflow: hidden;
        width: 280px;
        text-align: center;
      }
      .loader-tip {
        position: absolute;
        inset: 0;
        animation: tip-rotate 9s linear infinite;
        opacity: 0;
      }
      .loader-tip:nth-child(1) { animation-delay: 0s; }
      .loader-tip:nth-child(2) { animation-delay: 3s; }
      .loader-tip:nth-child(3) { animation-delay: 6s; }
      @keyframes tip-rotate {
        0%, 33%, 100% { opacity: 0; transform: translateY(10px); }
        4%, 30% { opacity: 1; transform: translateY(0); }
      }

      /* 进度条 */
      .loader-progress {
        margin-top: 24px;
        width: 220px;
        height: 6px;
        background: rgba(99, 102, 241, 0.12);
        border-radius: 99px;
        overflow: hidden;
      }
      .loader-progress::after {
        content: '';
        display: block;
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #6366f1, #ec4899, #f59e0b, #6366f1);
        background-size: 200% 100%;
        border-radius: 99px;
        animation: progress-slide 1.8s ease-in-out infinite, gradient-shift 3s linear infinite;
      }
      @keyframes progress-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
      @keyframes gradient-shift {
        0% { background-position: 0% 50%; }
        100% { background-position: 200% 50%; }
      }

      /* 暗色模式适配 */
      @media (prefers-color-scheme: dark) {
        #app-loader {
          background:
            radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.2) 0%, transparent 40%),
            radial-gradient(circle at 80% 30%, rgba(168, 85, 247, 0.2) 0%, transparent 40%),
            radial-gradient(circle at 50% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 40%),
            linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
        }
        .loader-title { color: #f3f4f6; }
        .loader-tips { color: #9ca3af; }
      }

      /* 移动端响应式 */
      @media (max-width: 480px) {
        .loader-mascot { width: 90px; height: 90px; }
        .loader-title { font-size: 18px; }
        .loader-tips { font-size: 12px; width: 240px; }
        .loader-progress { width: 180px; }
      }
    </style>
  </head>
  <body>
    <!-- 全局加载动画，会在 Vue 应用挂载完成后移除 -->
    <div id="app-loader">
      <div class="loader-bubble"></div>
      <div class="loader-bubble"></div>
      <div class="loader-bubble"></div>
      <div class="loader-bubble"></div>
      <div class="loader-bubble"></div>

      <div class="loader-stage">
        <div class="loader-mascot">
          <div class="mascot-hat"></div>
          <div class="mascot-body">
            <div class="mascot-eye left"></div>
            <div class="mascot-eye right"></div>
            <div class="mascot-cheek left"></div>
            <div class="mascot-cheek right"></div>
            <div class="mascot-mouth"></div>
          </div>
        </div>
        <div class="mascot-shadow"></div>
        <div class="loader-title">
          <span>爸</span><span>妈</span><span>工</span><span>具</span><span>箱</span>
        </div>
        <div class="loader-tips">
          <div class="loader-tip">☕ 给您泡杯咖啡，马上就好…</div>
          <div class="loader-tip">📚 正在打开育儿百宝箱…</div>
          <div class="loader-tip">✨ 一切美好，值得等待…</div>
        </div>
        <div class="loader-progress"></div>
      </div>
    </div>

    <div id="app"></div>
    <script>
      // GitHub Pages SPA 回退：恢复 sessionStorage 中保存的路由
      (function() {
        var redirect = sessionStorage.getItem('spa-route');
        if (redirect) {
          sessionStorage.removeItem('spa-route');
          if (redirect !== location.pathname) {
            history.replaceState(null, '', redirect);
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
