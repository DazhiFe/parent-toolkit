<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>家长工具箱</title>
    <script>
      // SPA 回退：将路径存到 sessionStorage，跳转首页由 Vue Router 接管
      var path = window.location.pathname
      if (path !== '/' && !path.match(/\.\w+$/)) {
        // 自动计算 base 路径（兼容 /parent-toolkit/ 等子目录部署）
        var parts = path.split('/')
        var base = '/' + (parts[1] || '') + '/'
        if (base === '//') base = '/'
        sessionStorage.setItem('spa-route', path)
        window.location.replace(base)
      }
    </script>
  </head>
  <body>
    <p>页面加载中...</p>
  </body>
</html>
