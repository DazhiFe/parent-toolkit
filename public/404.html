<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>家长工具箱</title>
    <script>
      // SPA 回退：将路径存到 sessionStorage，跳转首页由 Vue Router 接管
      var path = window.location.pathname
      if (path !== '/' && !path.match(/\.\w+$/)) {
        sessionStorage.setItem('spa-route', path)
        window.location.replace(window.location.origin + '/')
      }
    </script>
  </head>
  <body>
    <p>页面加载中...</p>
  </body>
</html>
